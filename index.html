<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дастан & Бибігүл - Үйлену тойы</title>
    <style>
        /* Стильдер осында қалады */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
        body, html { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; color: #5c4b37; scroll-behavior: smooth; }
        .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; background-size: cover; background-position: center; background-attachment: fixed; position: relative; }
        .gold-text { color: #D4AF37; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        #home { background-image: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('https://i.ibb.co.com/Psz8rnFZ/a7e7f012628fb7263c1eca4625746b5f.jpg'); }
        .date-top { font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 20px; }
        .initials { font-family: 'Great Vibes', cursive; font-size: 6rem; margin: 0; }
        #invitation { background-image: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), url('https://i.ibb.co.com/B5SP49J3/5a9932e7dbfd49993de698428b7038dd.jpg'); }
        .names-big { font-family: 'Great Vibes', cursive; font-size: 4rem; margin: 20px 0; }
        .calendar { background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 10px; border: 1px solid #D4AF37; margin: 20px 0; }
        .highlight-circle { background: #D4AF37; color: white; border-radius: 50%; padding: 5px 10px; }
        .timer-container { display: flex; gap: 15px; margin: 30px 0; }
        .timer-box { background: rgba(212, 175, 55, 0.1); padding: 10px; border: 1px solid #D4AF37; min-width: 70px; }
        .timer-num { font-size: 1.5rem; font-weight: bold; }
        .form-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #D4AF37; color: white; border: none; cursor: pointer; font-weight: bold; }
        .music-control { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .music-btn { width: 50px; height: 50px; border-radius: 50%; background: #D4AF37; border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="music-control">
        <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>
        <audio id="bgMusic" loop>
            <source src="Арнау - Адалдық.mp3" type="audio/mpeg">
        </audio>
    </div>

    <section class="page" id="home">
        <div class="date-top gold-text">06.06.2026</div>
        <h1 class="initials gold-text">Д & Б</h1>
    </section>

    <section class="page" id="invitation">
        <h2 class="names-big gold-text">Дастан & Бибігүл</h2>
        <p>Сіздерді ұлымыз <strong>Дастан</strong> мен келініміз <strong>Бибігүлдің</strong> үйлену тойына шақырамыз!</p>
        <div class="calendar">
            <h3>Маусым 2026</h3>
            <p><span class="highlight-circle">6</span> - сенбі, 19:00</p>
        </div>
        <div class="timer-container">
            <div class="timer-box"><div class="timer-num" id="days">00</div><div>күн</div></div>
            <div class="timer-box"><div class="timer-num" id="hours">00</div><div>сағат</div></div>
            <div class="timer-box"><div class="timer-num" id="mins">00</div><div>мин</div></div>
            <div class="timer-box"><div class="timer-num" id="secs">00</div><div>сек</div></div>
        </div>
    </section>

    <script>

        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');

            if (audio.paused) {
                audio.play();
                btn.innerHTML = '⏸';
            } else {
                audio.pause();
                btn.innerHTML = '🎵';
            }
        }
